name: Release aDHL

on:
  push:
    tags:
      - "*"

env:
  PLUGIN_NAME: aDHL

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Print env and files
        run: |
          set -x
          echo "Ref: $GITHUB_REF  Name: $GITHUB_REF_NAME"
          ls -la
          test -f yarn.lock && echo "yarn.lock found" || echo "yarn.lock MISSING"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: |
            ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install
        run: |
          set -x
          yarn --version
          yarn --frozen-lockfile

      - name: Build
        run: |
          set -x
          yarn build

      - name: Verify version equals tag
        run: |
          set -x
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('manifest.json','utf8')).version;const t=process.env.GITHUB_REF_NAME; if(v!==t){console.error(`Tag (${t}) does not match manifest.json version (${v})`);process.exit(1)}"

      - name: Package
        run: |
          set -x
          mkdir -p "${{ env.PLUGIN_NAME }}"
          cp manifest.json "${{ env.PLUGIN_NAME }}/"
          cp main.js "${{ env.PLUGIN_NAME }}/"
          if [ -f styles.css ]; then cp styles.css "${{ env.PLUGIN_NAME }}/"; fi
          zip -r "${{ env.PLUGIN_NAME }}.zip" "${{ env.PLUGIN_NAME }}"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            ${{ env.PLUGIN_NAME }}.zip
            main.js
            manifest.json
            styles.css
